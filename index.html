<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tayyaba & Bilal Wedding Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;}

.scene{
  width:100vw;
  height:100svh;
  background:radial-gradient(ellipse at 50% 18%,#1c2e50 0%,#0c1628 45%,#060c18 100%);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}

.sd{position:absolute;border-radius:50%;background:#fff;pointer-events:none;}
.sd.bl{animation:bl ease-in-out infinite;}
@keyframes bl{0%,100%{opacity:.1;}50%{opacity:1;}}
.shoot{position:absolute;height:1.5px;background:linear-gradient(to right,transparent,#fff 40%,transparent);border-radius:2px;opacity:0;pointer-events:none;animation:shoot linear infinite;}
@keyframes shoot{0%{opacity:0;transform:translate(0,0) rotate(-22deg) scaleX(0);}2%{opacity:1;}18%{opacity:0;transform:translate(260px,110px) rotate(-22deg) scaleX(1);}100%{opacity:0;}}
.moon-wrap{position:absolute;top:12px;left:50%;transform:translateX(-50%) scale(0) translateY(30px);opacity:0;animation:moonRise 2s .3s cubic-bezier(.34,1.4,.64,1) forwards;pointer-events:none;}
@keyframes moonRise{to{transform:translateX(-50%) scale(1) translateY(0);opacity:1;}}
.moon-halo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;animation:haloPulse 3.5s ease-in-out infinite;}
@keyframes haloPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.7;}50%{transform:translate(-50%,-50%) scale(1.2);opacity:.3;}}
.ff{position:absolute;width:4px;height:4px;border-radius:50%;background:#b8ff88;pointer-events:none;animation:ffAnim ease-in-out infinite;box-shadow:0 0 5px 2px rgba(140,255,80,.5);}
@keyframes ffAnim{0%{transform:translate(0,0);opacity:0;}20%{opacity:1;}50%{transform:translate(var(--x1),var(--y1));opacity:.3;}75%{transform:translate(var(--x2),var(--y2));opacity:.9;}100%{transform:translate(0,0);opacity:0;}}
.bird{position:absolute;pointer-events:none;opacity:0;animation:birdFly linear forwards;}
@keyframes birdFly{0%{transform:translateX(0);opacity:0;}5%{opacity:.8;}92%{opacity:.5;}100%{transform:translateX(110vw);opacity:0;}}
.lantern{position:absolute;pointer-events:none;animation:lanternFloat linear forwards;opacity:0;}
@keyframes lanternFloat{0%{opacity:0;transform:translateY(0);}5%{opacity:1;}90%{opacity:.7;}100%{opacity:0;transform:translateY(-110vh) rotate(var(--rot));}}
.lglow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;animation:lglow 1.2s ease-in-out infinite alternate;}
@keyframes lglow{from{transform:translate(-50%,-50%) scale(1);}to{transform:translate(-50%,-50%) scale(1.4);}}
.dust{position:absolute;border-radius:50%;pointer-events:none;animation:dustFade 1.1s ease forwards;}
@keyframes dustFade{0%{opacity:.9;transform:scale(1);}100%{opacity:0;transform:scale(.2) translateY(-18px);}}

/* ── CARD: fits 100% height, never overflows ── */
.card-stage{
  position:relative;z-index:30;display:none;
  /* width: whichever is smaller — 92vw or height-based width */
  width:min(92vw, 56vh, 480px);
}

.border-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
.border-path{fill:none;stroke:#b8962e;stroke-width:2;stroke-dasharray:2600;stroke-dashoffset:2600;}
.border-path.draw{animation:drawBorder 2.4s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes drawBorder{to{stroke-dashoffset:0;}}
.border-inner{fill:none;stroke:rgba(184,150,46,.35);stroke-width:.7;stroke-dasharray:2550;stroke-dashoffset:2550;}
.border-inner.draw{animation:drawBorder 2.8s .3s cubic-bezier(.4,0,.2,1) forwards;}

.shimmer-sweep{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:5;opacity:0;}
.shimmer-sweep.run{opacity:1;}
.shimmer-sweep::after{content:'';position:absolute;top:-100%;left:-80%;width:50%;height:300%;background:linear-gradient(105deg,transparent 30%,rgba(255,240,150,.14) 50%,transparent 70%);animation:sweepAnim 2.2s .4s ease forwards;}
@keyframes sweepAnim{0%{left:-80%;}100%{left:160%;}}
.shimmer-sweep.loop::after{animation:sweepLoop 5s 2.6s ease-in-out infinite;}
@keyframes sweepLoop{0%,100%{left:-80%;opacity:0;}10%{opacity:1;}60%{left:160%;opacity:0;}}

.orbit-ring{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:8;opacity:0;transition:opacity 1s ease;overflow:visible;}
.orbit-ring.show{opacity:1;}
.orb-dot{position:absolute;border-radius:50%;background:#d4af37;animation:orbitSpin linear infinite;}
@keyframes orbitSpin{0%{transform:rotate(var(--start)) translateX(var(--r));}100%{transform:rotate(calc(var(--start)+360deg)) translateX(var(--r));}}

/* ── ALL FONT SIZES RELATIVE TO VIEWPORT HEIGHT so card always fits ── */
.inv-card{
  background:linear-gradient(160deg,#0b1c0b 0%,#0e2212 50%,#081508 100%);
  width:100%;
  /* padding scales with vh */
  padding:2.5vh 4vw 2.5vh;
  text-align:center;position:relative;
  opacity:0;transition:opacity .8s ease;
}
.inv-card.show{opacity:1;}

.inv-tag{font-family:'Cormorant Garamond',serif;font-size:min(1.4vh,13px);letter-spacing:4px;color:#b8962e;text-transform:uppercase;}
.inv-line{width:min(18vw,100px);height:1px;background:linear-gradient(to right,transparent,#b8962e,transparent);margin:min(1vh,8px) auto;}
.inv-together{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:min(1.8vh,16px);color:#c0a858;letter-spacing:1px;margin-bottom:min(1.2vh,10px);}

.inv-bride{
  font-family:'Great Vibes',cursive;
  font-size:min(7vh,58px);
  color:#f0e0a0;line-height:1.1;margin:0;
  animation:nameGlow 2.5s ease-in-out infinite;
}
.inv-groom{
  font-family:'Great Vibes',cursive;
  font-size:min(7vh,58px);
  color:#f0e0a0;line-height:1.1;margin:0;
  animation:nameGlow 2.5s .4s ease-in-out infinite;
}
@keyframes nameGlow{
  0%,100%{text-shadow:0 0 18px rgba(212,175,55,.6),0 0 36px rgba(212,175,55,.2);}
  50%{text-shadow:0 0 36px rgba(255,210,60,1),0 0 70px rgba(212,175,55,.5);}
}
.inv-amp{font-family:'Great Vibes',cursive;font-size:min(5vh,44px);color:#b8962e;display:block;margin:min(.4vh,4px) 0;text-shadow:0 0 14px rgba(184,150,46,.6);}
.inv-divider{display:block;margin:min(1vh,8px) auto;}
.inv-invite{font-family:'Cormorant Garamond',serif;font-size:min(1.3vh,12px);letter-spacing:2px;color:#907040;text-transform:uppercase;margin:min(1vh,8px) 0;}
.inv-date{font-family:'Cormorant Garamond',serif;font-size:min(3vh,26px);color:#e0cc80;letter-spacing:1.5px;margin-bottom:min(.4vh,4px);}
.inv-day{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:min(1.7vh,15px);color:#807050;margin-bottom:min(.5vh,4px);}
.inv-dots{color:#b8962e;letter-spacing:6px;font-size:min(1.2vh,11px);margin:min(.5vh,4px) 0;}
.inv-time{font-family:'Cormorant Garamond',serif;font-size:min(2.6vh,22px);color:#e0cc80;letter-spacing:1.5px;margin-bottom:min(.6vh,5px);}
.inv-venue{font-family:'Great Vibes',cursive;font-size:min(5vh,42px);color:#b8962e;text-shadow:0 0 18px rgba(184,150,46,.5);}
.inv-city{font-family:'Cormorant Garamond',serif;font-size:min(1.3vh,12px);letter-spacing:3px;color:#607040;text-transform:uppercase;margin-bottom:min(1.2vh,10px);}
.inv-rsvp-wrap{border-top:1px solid rgba(184,150,46,.38);padding-top:min(1.2vh,10px);margin-top:min(.4vh,3px);}
.inv-rsvp-lbl{font-family:'Cormorant Garamond',serif;font-size:min(1.2vh,11px);letter-spacing:3px;color:#806030;text-transform:uppercase;margin-bottom:min(.5vh,4px);}
.inv-rsvp-name{font-family:'Cormorant Garamond',serif;font-size:min(2.4vh,20px);color:#c0a858;}
.inv-rsvp-num{font-family:'Cormorant Garamond',serif;font-size:min(2.6vh,22px);color:#b8962e;letter-spacing:2px;}

.cfi{opacity:0;}
.cfi.appear{animation:cfi .9s ease forwards;}
@keyframes cfi{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.cc{position:absolute;width:min(5vh,44px);height:min(5vh,44px);pointer-events:none;}
.cc.tl{top:4px;left:4px;}.cc.tr{top:4px;right:4px;transform:scaleX(-1);}
.cc.bl{bottom:4px;left:4px;transform:scaleY(-1);}.cc.br{bottom:4px;right:4px;transform:scale(-1,-1);}

.tap-hint{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  font-family:'Cormorant Garamond',serif;
  font-size:min(3vh,26px);
  font-style:italic;letter-spacing:4px;
  color:#d4af37;text-transform:uppercase;
  white-space:nowrap;z-index:40;
  animation:hintP 1.6s ease-in-out infinite;
  text-shadow:0 0 20px rgba(212,175,55,.9),0 0 40px rgba(212,175,55,.4);
}
@keyframes hintP{0%,100%{opacity:.3;transform:translateX(-50%) scale(.97);}50%{opacity:1;transform:translateX(-50%) scale(1.03);}}
</style>
</head>
<body>
<div class="scene" id="scene">
  <div class="moon-wrap">
    <div class="moon-halo" style="width:170px;height:170px;background:radial-gradient(circle,rgba(255,230,120,.11) 0%,transparent 70%);"></div>
    <div class="moon-halo" style="width:100px;height:100px;background:radial-gradient(circle,rgba(255,235,150,.19) 0%,transparent 70%);"></div>
    <svg width="52" height="52" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <defs><radialGradient id="mg" cx="38%" cy="32%" r="58%"><stop offset="0%" stop-color="#fff9e8"/><stop offset="55%" stop-color="#ffe890"/><stop offset="100%" stop-color="#c8980a"/></radialGradient></defs>
      <circle cx="32" cy="32" r="30" fill="url(#mg)"/>
      <circle cx="22" cy="20" r="4" fill="rgba(180,130,10,.18)"/>
      <circle cx="40" cy="27" r="2.8" fill="rgba(180,130,10,.13)"/>
      <circle cx="28" cy="40" r="3.2" fill="rgba(180,130,10,.16)"/>
    </svg>
  </div>

  <div class="card-stage" id="cardStage">
    <svg class="border-svg" id="borderSvg" viewBox="0 0 300 580" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <rect class="border-path" id="bp" x="2" y="2" width="296" height="576" rx="3"/>
      <rect class="border-inner" id="bi" x="9" y="9" width="282" height="562" rx="2"/>
      <g stroke="#b8962e" stroke-width=".8" fill="none" opacity=".8">
        <path d="M2 44 Q2 2 44 2"/><path d="M256 2 Q298 2 298 44"/>
        <path d="M2 538 Q2 578 44 578"/><path d="M256 578 Q298 578 298 538"/>
      </g>
      <g fill="#b8962e" opacity=".7">
        <circle cx="27" cy="15" r="2.8"/><circle cx="273" cy="15" r="2.8"/>
        <circle cx="27" cy="565" r="2.8"/><circle cx="273" cy="565" r="2.8"/>
      </g>
    </svg>
    <div class="shimmer-sweep" id="shimmer"></div>
    <div class="orbit-ring" id="orbitRing"></div>
    <div class="inv-card" id="invCard">
      <svg class="cc tl" viewBox="0 0 40 40" fill="none"><path d="M3 37 Q3 3 37 3" stroke="#b8962e" stroke-width="1" fill="none"/><ellipse cx="9" cy="21" rx="6" ry="3.5" fill="#2a5a1a" opacity=".5" transform="rotate(-30 9 21)"/><ellipse cx="20" cy="8" rx="5" ry="3" fill="#2a5a1a" opacity=".5" transform="rotate(20 20 8)"/><circle cx="25" cy="16" r="2.4" fill="#b8962e" opacity=".9"/></svg>
      <svg class="cc tr" viewBox="0 0 40 40" fill="none"><path d="M3 37 Q3 3 37 3" stroke="#b8962e" stroke-width="1" fill="none"/><ellipse cx="9" cy="21" rx="6" ry="3.5" fill="#2a5a1a" opacity=".5" transform="rotate(-30 9 21)"/><ellipse cx="20" cy="8" rx="5" ry="3" fill="#2a5a1a" opacity=".5" transform="rotate(20 20 8)"/><circle cx="25" cy="16" r="2.4" fill="#b8962e" opacity=".9"/></svg>
      <svg class="cc bl" viewBox="0 0 40 40" fill="none"><path d="M3 37 Q3 3 37 3" stroke="#b8962e" stroke-width="1" fill="none"/><ellipse cx="9" cy="21" rx="6" ry="3.5" fill="#2a5a1a" opacity=".5" transform="rotate(-30 9 21)"/><ellipse cx="20" cy="8" rx="5" ry="3" fill="#2a5a1a" opacity=".5" transform="rotate(20 20 8)"/><circle cx="25" cy="16" r="2.4" fill="#b8962e" opacity=".9"/></svg>
      <svg class="cc br" viewBox="0 0 40 40" fill="none"><path d="M3 37 Q3 3 37 3" stroke="#b8962e" stroke-width="1" fill="none"/><ellipse cx="9" cy="21" rx="6" ry="3.5" fill="#2a5a1a" opacity=".5" transform="rotate(-30 9 21)"/><ellipse cx="20" cy="8" rx="5" ry="3" fill="#2a5a1a" opacity=".5" transform="rotate(20 20 8)"/><circle cx="25" cy="16" r="2.4" fill="#b8962e" opacity=".9"/></svg>

      <div class="inv-tag cfi">Wedding Invitation</div>
      <div class="inv-line cfi"></div>
      <div class="inv-together cfi">Together with their families</div>
      <p class="inv-bride cfi">Tayyaba Tehreem</p>
      <span class="inv-amp cfi">&</span>
      <p class="inv-groom cfi">Bilal Shakoor</p>
      <svg class="inv-divider cfi" width="60%" height="18" viewBox="0 0 170 22" fill="none">
        <line x1="5" y1="11" x2="58" y2="11" stroke="#b8962e" stroke-width=".8"/>
        <line x1="112" y1="11" x2="165" y2="11" stroke="#b8962e" stroke-width=".8"/>
        <ellipse cx="71" cy="11" rx="5" ry="3.5" fill="#3a6a1a" opacity=".6" transform="rotate(-20 71 11)"/>
        <ellipse cx="99" cy="11" rx="5" ry="3.5" fill="#3a6a1a" opacity=".6" transform="rotate(20 99 11)"/>
        <circle cx="85" cy="11" r="3.2" fill="#b8962e"/>
        <circle cx="65" cy="9" r="1.4" fill="#b8962e" opacity=".6"/>
        <circle cx="105" cy="9" r="1.4" fill="#b8962e" opacity=".6"/>
      </svg>
      <div class="inv-invite cfi">request the honour of your presence</div>
      <div class="inv-date cfi">28 April 2026</div>
      <div class="inv-day cfi">Tuesday Evening</div>
      <div class="inv-dots cfi">· · · · ·</div>
      <div class="inv-time cfi">8:00 PM onwards</div>
      <div class="inv-dots cfi">· · · · ·</div>
      <div class="inv-venue cfi">Taj Greens</div>
      <div class="inv-city cfi">Sargodha, Pakistan</div>
      <div class="inv-rsvp-wrap cfi">
        <div class="inv-rsvp-lbl">RSVP</div>
        <div class="inv-rsvp-name">Muhammad Aslam</div>
        <div class="inv-rsvp-num">0301 673 7039</div>
      </div>
    </div>
  </div>

  <div class="tap-hint" id="tapHint">✦ Tap to Reveal ✦</div>
</div>

<script>
const scene=document.getElementById('scene');
let revealed=false;
function rnd(a,b){return a+Math.random()*(b-a);}

for(let i=0;i<120;i++){
  const s=document.createElement('div');
  s.className='sd'+(Math.random()>.45?' bl':'');
  const sz=.4+Math.random()*2.2;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${rnd(0,100)}%;top:${rnd(0,100)}%;opacity:${rnd(.1,.85)};box-shadow:0 0 ${sz*2}px rgba(255,250,200,.9);animation-duration:${rnd(1.5,5)}s;animation-delay:${rnd(0,5)}s;`;
  scene.appendChild(s);
}
[{l:'8%',t:'9%',w:'120px',d:'7s',dl:'1s'},{l:'55%',t:'5%',w:'95px',d:'9s',dl:'4.5s'},{l:'18%',t:'18%',w:'80px',d:'11s',dl:'8s'}].forEach(o=>{
  const el=document.createElement('div');el.className='shoot';
  el.style.cssText=`left:${o.l};top:${o.t};width:${o.w};animation-duration:${o.d};animation-delay:${o.dl};`;
  scene.appendChild(el);
});
for(let i=0;i<24;i++){
  const f=document.createElement('div');f.className='ff';
  const r=()=>rnd(-50,50)+'px';
  f.style.cssText=`left:${rnd(3,97)}%;top:${rnd(15,92)}%;--x1:${r()};--y1:${r()};--x2:${r()};--y2:${r()};animation-duration:${rnd(3,7)}s;animation-delay:${rnd(0,6)}s;`;
  scene.appendChild(f);
}
function releaseBirds(){
  const count=3+Math.floor(rnd(0,4));
  const baseY=rnd(5,18);
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      const b=document.createElement('div');b.className='bird';
      const sc=rnd(.65,1.0);
      b.style.cssText=`left:-50px;top:${baseY+i*rnd(2,5)}%;animation-duration:${rnd(7,13)}s;`;
      b.innerHTML=`<svg width="${22*sc}" height="${9*sc}" viewBox="0 0 24 10" fill="none"><path d="M1 6 Q6 1 12 5 Q18 9 23 4" stroke="rgba(190,210,255,0.65)" stroke-width="1.3" fill="none" stroke-linecap="round"/></svg>`;
      scene.appendChild(b);setTimeout(()=>b.remove(),14000);
    },i*350);
  }
}
releaseBirds();setInterval(releaseBirds,11000);

function makeLantern(){
  const x=rnd(2,94),dur=rnd(9,16),rot=rnd(-16,16)+'deg';
  const hue=Math.random()>.5?'#ffaa22':'#ff7733';
  const el=document.createElement('div');el.className='lantern';
  el.style.cssText=`left:${x}%;bottom:-30px;--rot:${rot};animation-duration:${dur}s;`;
  el.innerHTML=`<div style="position:relative;width:22px;height:30px;"><div class="lglow" style="width:56px;height:56px;background:radial-gradient(circle,${hue}44 0%,transparent 70%);"></div><svg width="22" height="30" viewBox="0 0 22 30" fill="none"><line x1="11" y1="0" x2="11" y2="4" stroke="${hue}" stroke-width="1.2"/><path d="M5 5 Q3 14 3 18 Q3 26 11 28 Q19 26 19 18 Q19 14 17 5 Z" fill="${hue}" opacity=".85"/><path d="M5 5 Q3 14 3 18 Q3 26 11 28 Q19 26 19 18 Q19 14 17 5 Z" fill="rgba(255,255,200,.15)"/><ellipse cx="11" cy="5" rx="6" ry="2.5" fill="${hue}"/><ellipse cx="11" cy="28" rx="5" ry="2" fill="${hue}" opacity=".7"/><line x1="7" y1="28" x2="9" y2="33" stroke="${hue}" stroke-width=".8" opacity=".6"/><line x1="15" y1="28" x2="13" y2="33" stroke="${hue}" stroke-width=".8" opacity=".6"/></svg></div>`;
  scene.appendChild(el);setTimeout(()=>el.remove(),(dur+1)*1000);
}
makeLantern();setInterval(makeLantern,1800);
for(let i=0;i<6;i++) setTimeout(makeLantern,i*900);

const dustColors=['#b8962e','#d4af37','#ffe066','#c8f080','#ffffff','#ffcc44'];
function spawnDust(x,y){
  for(let i=0;i<3;i++){
    const d=document.createElement('div');d.className='dust';
    const sz=2+Math.random()*4;
    d.style.cssText=`left:${x+rnd(-12,12)}px;top:${y+rnd(-12,12)}px;width:${sz}px;height:${sz}px;background:${dustColors[~~rnd(0,dustColors.length)]};position:absolute;z-index:50;animation-delay:${rnd(0,.12)}s;`;
    scene.appendChild(d);setTimeout(()=>d.remove(),1300);
  }
}
scene.addEventListener('mousemove',e=>{const r=scene.getBoundingClientRect();spawnDust(e.clientX-r.left,e.clientY-r.top);});
scene.addEventListener('touchmove',e=>{const t=e.touches[0];const r=scene.getBoundingClientRect();spawnDust(t.clientX-r.left,t.clientY-r.top);},{passive:true});

function buildOrbit(){
  const ring=document.getElementById('orbitRing');
  const W=document.getElementById('cardStage').offsetWidth;
  const H=document.getElementById('invCard').offsetHeight;
  const cx=W/2,cy=H/2;
  [{r:W*0.54,n:10,sz:4,dur:13,dir:'normal'},{r:W*0.60,n:7,sz:3,dur:20,dir:'reverse'}].forEach(o=>{
    for(let i=0;i<o.n;i++){
      const dot=document.createElement('div');dot.className='orb-dot';
      const ang=(i/o.n)*360;
      dot.style.cssText=`width:${o.sz}px;height:${o.sz}px;left:${cx}px;top:${cy}px;margin:-${o.sz/2}px 0 0 -${o.sz/2}px;--start:${ang}deg;--r:${o.r}px;animation-duration:${o.dur}s;animation-direction:${o.dir};opacity:${.5+Math.random()*.5};box-shadow:0 0 ${o.sz+2}px ${o.sz}px rgba(212,175,55,.55);`;
      ring.appendChild(dot);
    }
  });
}

function startReveal(){
  if(revealed)return;
  revealed=true;
  document.getElementById('tapHint').style.display='none';
  for(let i=0;i<8;i++) setTimeout(makeLantern,i*150);
  const stage=document.getElementById('cardStage');
  const card=document.getElementById('invCard');
  const shimmer=document.getElementById('shimmer');
  const orbit=document.getElementById('orbitRing');
  stage.style.display='block';
  setTimeout(()=>{document.getElementById('bp').classList.add('draw');document.getElementById('bi').classList.add('draw');},100);
  setTimeout(()=>{card.classList.add('show');shimmer.classList.add('run');},2000);
  card.querySelectorAll('.cfi').forEach((el,i)=>setTimeout(()=>el.classList.add('appear'),2300+i*120));
  setTimeout(()=>{shimmer.classList.add('loop');buildOrbit();orbit.classList.add('show');},4200);
  const cx=scene.offsetWidth/2,cy=scene.offsetHeight/2;
  for(let i=0;i<50;i++){
    setTimeout(()=>{
      const d=document.createElement('div');d.className='dust';
      const sz=2+Math.random()*6;
      d.style.cssText=`left:${cx+rnd(-160,160)}px;top:${cy+rnd(-200,80)}px;width:${sz}px;height:${sz}px;background:${dustColors[~~rnd(0,dustColors.length)]};position:absolute;z-index:50;`;
      scene.appendChild(d);setTimeout(()=>d.remove(),1400);
    },i*28);
  }
}
scene.addEventListener('click',startReveal);
scene.addEventListener('touchend',e=>{e.preventDefault();startReveal();},{passive:false});
</script>
</body>
